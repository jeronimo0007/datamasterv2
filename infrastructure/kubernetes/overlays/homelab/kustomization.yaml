apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Tags atualizados pelo deploy-kubernetes-server.sh (IMAGE_TAG / git SHA).
images:
  - name: datamaster-api
    newName: datamaster-api
    newTag: latest
  - name: datamaster-dashboard
    newName: datamaster-dashboard
    newTag: latest
  - name: datamaster-portal
    newName: datamaster-portal
    newTag: latest
  - name: datamaster-data-console
    newName: datamaster-data-console
    newTag: latest
