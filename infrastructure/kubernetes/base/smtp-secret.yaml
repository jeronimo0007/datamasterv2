# Preencha via .env no deploy ou: kubectl edit secret datamaster-smtp-secrets -n datamaster
apiVersion: v1
kind: Secret
metadata:
  name: datamaster-smtp-secrets
  namespace: datamaster
type: Opaque
stringData:
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "noreply@datamaster.local"
  FRAUD_ALERT_TO: "admin@example.com"
