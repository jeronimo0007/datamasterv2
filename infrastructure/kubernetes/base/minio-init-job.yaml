apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: datamaster
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              sleep 5
              mc alias set local http://minio:9000 minioadmin minioadmin
              mc mb -p local/bronze local/silver local/gold 2>/dev/null || true
              echo "Buckets Medallion prontos"
