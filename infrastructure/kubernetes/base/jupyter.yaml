apiVersion: v1
kind: Service
metadata:
  name: jupyter
  namespace: datamaster
  labels:
    app: jupyter
spec:
  type: NodePort
  ports:
    - name: http
      port: 8888
      targetPort: 8888
      nodePort: 30888
  selector:
    app: jupyter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: datamaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupyter
  template:
    metadata:
      labels:
        app: jupyter
    spec:
      initContainers:
        - name: wait-spark
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 120); do
                nc -z spark-master 7077 && exit 0
                sleep 3
              done
              echo "AVISO: spark-master ainda nao respondeu; jupyter sobe mesmo assim"
              exit 0
      containers:
        - name: jupyter
          image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: JUPYTER_TOKEN
              value: datamaster
            - name: SPARK_MASTER
              value: spark://spark-master:7077
            - name: PYSPARK_SUBMIT_ARGS
              value: "--master spark://spark-master:7077 pyspark-shell"
            - name: GRANT_SUDO
              value: "yes"
          args:
            - start-notebook.sh
            - --NotebookApp.token=datamaster
            - --NotebookApp.password=
          readinessProbe:
            httpGet:
              path: /api
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: workspace
              mountPath: /home/jovyan/work
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 2Gi
      volumes:
        # emptyDir evita crash por permissao no hostPath (repo fica no data-console)
        - name: workspace
          emptyDir: {}
