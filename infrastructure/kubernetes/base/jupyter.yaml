apiVersion: v1
kind: Service
metadata:
  name: jupyter
  namespace: datamaster
  labels:
    app: jupyter
spec:
  type: NodePort
  ports:
    - name: http
      port: 8888
      targetPort: 8888
      nodePort: 30888
  selector:
    app: jupyter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: datamaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupyter
  template:
    metadata:
      labels:
        app: jupyter
    spec:
      containers:
        - name: jupyter
          image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
          ports:
            - containerPort: 8888
          env:
            - name: JUPYTER_TOKEN
              value: datamaster
            - name: SPARK_MASTER
              value: spark://spark-master:7077
            - name: PYSPARK_SUBMIT_ARGS
              value: "--master spark://spark-master:7077 pyspark-shell"
          command:
            - start-notebook.sh
            - --NotebookApp.token=datamaster
            - --NotebookApp.password=
          volumeMounts:
            - name: workspace
              mountPath: /home/jovyan/work
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 2Gi
      volumes:
        - name: workspace
          hostPath:
            path: /home/servidor/kubernets/datamasterv2
            type: Directory
