apiVersion: v1
kind: Service
metadata:
  # Nome evita JUPYTER_PORT=tcp://... injetado pelo K8s (Service com nome "jupyter")
  name: jupyter-svc
  namespace: datamaster
  labels:
    app: jupyter
spec:
  type: NodePort
  ports:
    - name: http
      port: 8888
      targetPort: 8888
      nodePort: 30888
  selector:
    app: jupyter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: datamaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupyter
  template:
    metadata:
      labels:
        app: jupyter
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-spark
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 120); do
                nc -z spark-master 7077 && exit 0
                sleep 3
              done
              echo "AVISO: spark-master lento; jupyter continua"
              exit 0
      containers:
        - name: jupyter
          # Docker Hub (quay.io costuma falhar/ demorar no VPS)
          image: jupyter/pyspark-notebook:spark-3.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: JUPYTER_PORT
              value: "8888"
            - name: JUPYTER_TOKEN
              value: datamaster
            - name: SPARK_MASTER
              value: spark://spark-master:7077
            - name: PYSPARK_SUBMIT_ARGS
              value: "--master spark://spark-master:7077 pyspark-shell"
          args:
            - start-notebook.sh
            - --NotebookApp.token=datamaster
            - --NotebookApp.password=
          startupProbe:
            tcpSocket:
              port: 8888
            failureThreshold: 36
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8888
            periodSeconds: 10
          volumeMounts:
            - name: workspace
              mountPath: /home/jovyan/work
          resources:
            requests:
              memory: 512Mi
              cpu: 150m
            limits:
              memory: 2Gi
      volumes:
        - name: workspace
          emptyDir: {}
