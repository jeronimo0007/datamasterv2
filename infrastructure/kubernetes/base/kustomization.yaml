apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: datamaster

resources:
  - namespace.yaml
  - mongodb-secret.yaml
  - postgres-secret.yaml
  - app-secrets.yaml
  - mongodb.yaml
  - postgres.yaml
  - redis.yaml
  - zookeeper.yaml
  - kafka.yaml
  - minio.yaml
  - minio-init-job.yaml
  - spark.yaml
  - jupyter.yaml
  - prometheus-config.yaml
  - prometheus.yaml
  - grafana.yaml
  - api.yaml
  - dashboard.yaml
  - portal.yaml
  - data-console.yaml

# Arquivos em config/ (copias locais — Kustomize nao permite paths fora de base/)
configMapGenerator:
  - name: mongodb-init
    files:
      - init_mongo.js=config/init_mongo.js
  - name: postgres-init
    files:
      - 01-schema.sql=config/01-schema.sql
      - 02-seed_demo.sql=config/02-seed_demo.sql
  - name: grafana-datasources
    files:
      - prometheus.yml=config/grafana/provisioning/datasources/prometheus.yml
  - name: grafana-dashboards-provider
    files:
      - dashboards.yml=config/grafana/provisioning/dashboards/dashboards.yml
  - name: grafana-dashboards-json
    files:
      - datamaster-api.json=config/grafana/dashboards/datamaster-api.json

generatorOptions:
  disableNameSuffixHash: true
