apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: datamaster
  labels:
    app: api
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: datamaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mongodb 27017; do echo waiting mongodb; sleep 2; done
      containers:
        - name: api
          image: datamaster-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: MONGODB_URI
              value: mongodb://admin:admin123@mongodb.datamaster.svc.cluster.local:27017/fraud_detection?authSource=admin
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datamaster-app-secrets
                  key: DEEPSEEK_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
