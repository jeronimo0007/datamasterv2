    <text x="595" y="552" text-anchor="middle" fill="#605E5C">linhagem · catálogo</text>
    <text x="595" y="566" text-anchor="middle" fill="#605E5C">Lake Formation · Glue</text>

    <rect x="668" y="518" width="118" height="68" rx="4" fill="#fff" stroke="#8A8886" stroke-width="1"/>
    <text x="727" y="538" text-anchor="middle" font-weight="600">DevOps</text>
